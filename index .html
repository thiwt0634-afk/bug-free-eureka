<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 50px;
    }

    p {
      font-size: 20px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: #2a5298;
      border: none;
      border-radius: 20px;
      cursor: pointer;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>👋 Hello!</h1>
    <p>นี่คือเว็บไซต์แรกของฉัน 🚀</p>
    <button class="btn">Click Me</button>
  </div>
</body>
</html>
